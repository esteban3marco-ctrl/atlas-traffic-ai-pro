# ==============================================================================
# ATLAS Pro - Docker Compose
# ==============================================================================
# Levanta todo el stack de produccion:
#   - atlas-api: API REST + WebSocket + Dashboard
#   - atlas-controller: Agente RL controlando semaforo
#   - atlas-monitor: Monitoreo y alertas
#   - timescaledb: Base de datos de metricas historicas
#
# Uso:
#   docker-compose up -d                  # Levantar todo
#   docker-compose up atlas-api           # Solo API + Dashboard
#   docker-compose logs -f atlas-controller  # Ver logs del controlador
# ==============================================================================

version: "3.8"

services:
  # ============================================================================
  # API + Dashboard (puerto 8080)
  # ============================================================================
  atlas-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-api
    command: ["--api"]
    ports:
      - "8080:8080"
    volumes:
      - ./modelos:/app/modelos:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
    environment:
      - ATLAS_ENV=production
      - ATLAS_LOG_LEVEL=INFO
      - ATLAS_DB_URL=postgresql://atlas:atlas@timescaledb:5432/atlas
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Controlador RL (conecta con semaforo real)
  # ============================================================================
  atlas-controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-controller
    command: ["--controller"]
    volumes:
      - ./modelos:/app/modelos
      - ./config:/app/config:ro
      - ./logs:/app/logs
    environment:
      - ATLAS_ENV=production
      - ATLAS_MODEL=modelos/agente_pro_heavy.pt
      - NTCIP_HOST=${NTCIP_HOST:-192.168.1.100}
      - NTCIP_PORT=${NTCIP_PORT:-161}
      - NTCIP_COMMUNITY=${NTCIP_COMMUNITY:-atlas}
      - ATLAS_PROTOCOL=${ATLAS_PROTOCOL:-ntcip}  # ntcip | utmc | simulator
      - ATLAS_USE_MUSE=true
    network_mode: host  # necesario para acceder al controlador en la red local
    restart: unless-stopped

  # ============================================================================
  # Monitor de anomalias y alertas
  # ============================================================================
  atlas-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-monitor
    command: ["--monitor"]
    volumes:
      - ./logs:/app/logs
    environment:
      - ATLAS_ENV=production
      - ATLAS_DB_URL=postgresql://atlas:atlas@timescaledb:5432/atlas
      - ATLAS_ALERT_EMAIL=${ALERT_EMAIL:-}
      - ATLAS_ALERT_WEBHOOK=${ALERT_WEBHOOK:-}
    depends_on:
      - atlas-api
    restart: unless-stopped

  # ============================================================================
  # Base de datos TimescaleDB (metricas historicas)
  # ============================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: atlas-db
    ports:
      - "5432:5432"
    volumes:
      - atlas-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=atlas
      - POSTGRES_PASSWORD=atlas
      - POSTGRES_DB=atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  atlas-db-data:
    driver: local
